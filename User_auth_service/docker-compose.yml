
services:
 backend:
  # build the custom image from the docker file
  build: .
  container_name: go_server
  ports:
    - "8080:8080"
  
  depends_on:
    - mysql
  
  env_file:
    - .env

 mysql:

  image: mysql:9.7
  container_name: database

  restart: always

  ports:
    - "3307:3306"  
  
  environment:
    MYSQL_ROOT_PASSWORD: Anurag@123
    MYSQL_DATABASE: auth_db
  
  volumes:
    - mysql_data:/var/lib/mysql


volumes:
 mysql_data:
   
