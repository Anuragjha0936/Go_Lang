<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatly</title>
<style>
  :root{
    --wa-bg-app:#f0f2f5;
    --wa-panel:#ffffff;
    --wa-accent:#00a884;
    --wa-accent-dark:#008069;
    --wa-accent-light:#e7fce3;
    --wa-sent-bubble:#d9fdd3;
    --wa-received-bubble:#ffffff;
    --wa-chat-bg:#efeae2;
    --wa-text-primary:#111b21;
    --wa-text-secondary:#667781;
    --wa-border:#e9edef;
    --wa-hover:#f5f6f6;
    --wa-danger:#ea0038;
    --radius-lg:12px;
    --radius-md:8px;
    --radius-full:999px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--wa-bg-app);
    color:var(--wa-text-primary);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:#c8ccce;border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ---------- Auth screen ---------- */
  #authScreen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      linear-gradient(180deg, var(--wa-accent-dark) 0 35vh, var(--wa-bg-app) 35vh 100%);
    padding:24px;
  }
  .auth-card{
    width:100%;
    max-width:400px;
    background:var(--wa-panel);
    border-radius:var(--radius-lg);
    box-shadow:0 12px 32px rgba(0,0,0,.14);
    overflow:hidden;
  }
  .auth-brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding:36px 24px 20px;
  }
  .auth-logo{
    width:56px;height:56px;
    border-radius:16px;
    background:var(--wa-accent);
    display:flex;align-items:center;justify-content:center;
  }
  .auth-brand h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.2px;}
  .auth-brand p{margin:0;color:var(--wa-text-secondary);font-size:13.5px;text-align:center;}
  .auth-tabs{display:flex;border-bottom:1px solid var(--wa-border);margin:0 24px;}
  .auth-tab{
    flex:1;text-align:center;padding:12px 0;font-size:14px;font-weight:600;
    color:var(--wa-text-secondary);background:none;border:none;border-bottom:2px solid transparent;
  }
  .auth-tab.active{color:var(--wa-accent-dark);border-bottom-color:var(--wa-accent);}
  .auth-form{padding:22px 24px 26px;display:none;flex-direction:column;gap:14px;}
  .auth-form.active{display:flex;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12.5px;color:var(--wa-text-secondary);font-weight:600;}
  .field input{
    padding:11px 12px;border:1px solid var(--wa-border);border-radius:var(--radius-md);
    font-size:14.5px;outline:none;background:#fff;color:var(--wa-text-primary);
  }
  .field input:focus{border-color:var(--wa-accent);}
  .auth-submit{
    margin-top:6px;padding:11px;border:none;border-radius:var(--radius-full);
    background:var(--wa-accent);color:#fff;font-size:14.5px;font-weight:600;
  }
  .auth-submit:hover{background:var(--wa-accent-dark);}
  .auth-submit:disabled{opacity:.6;cursor:default;}
  .auth-error{
    font-size:13px;color:var(--wa-danger);background:#fdeaea;border-radius:var(--radius-md);
    padding:9px 11px;display:none;
  }
  .auth-error.show{display:block;}
  .auth-success{
    font-size:13px;color:var(--wa-accent-dark);background:var(--wa-accent-light);border-radius:var(--radius-md);
    padding:9px 11px;display:none;
  }
  .auth-success.show{display:block;}

  /* ---------- App shell ---------- */
  #appScreen{
    display:none;
    height:100vh;
    max-width:1600px;
    margin:0 auto;
  }
  #appScreen.active{display:flex;}
  .app-shell{
    display:flex;width:100%;height:100%;
    background:var(--wa-panel);
    box-shadow:0 0 0 1px var(--wa-border);
  }

  /* Sidebar */
  .sidebar{
    width:400px;min-width:300px;flex-shrink:0;
    display:flex;flex-direction:column;
    border-right:1px solid var(--wa-border);
    background:var(--wa-panel);
  }
  .sidebar-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;background:var(--wa-bg-app);border-bottom:1px solid var(--wa-border);
    height:59px;flex-shrink:0;
  }
  .me{display:flex;align-items:center;gap:10px;min-width:0;}
  .me-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
  .icon-btn{
    background:none;border:none;color:var(--wa-text-secondary);
    width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  .icon-btn:hover{background:var(--wa-hover);}
  .search-wrap{padding:8px 12px;background:var(--wa-panel);flex-shrink:0;}
  .search-box{
    display:flex;align-items:center;gap:10px;background:var(--wa-bg-app);
    border-radius:var(--radius-full);padding:8px 14px;
  }
  .search-box input{
    border:none;background:none;outline:none;font-size:14px;width:100%;color:var(--wa-text-primary);
  }
  .search-box svg{flex-shrink:0;}
  .contact-list{flex:1;overflow-y:auto;}
  .contact{
    display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;
    border-bottom:1px solid #f5f5f5;
  }
  .contact:hover{background:var(--wa-hover);}
  .contact.active{background:var(--wa-bg-app);}
  .avatar{
    width:46px;height:46px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:600;font-size:16px;user-select:none;
  }
  .avatar.sm{width:38px;height:38px;font-size:14px;}
  .contact-info{min-width:0;flex:1;}
  .contact-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .contact-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .contact-preview{font-size:13px;color:var(--wa-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .contact-time{font-size:11.5px;color:var(--wa-text-secondary);flex-shrink:0;}
  .unread-badge{
    background:var(--wa-accent);color:#fff;font-size:11px;font-weight:700;
    border-radius:var(--radius-full);min-width:19px;height:19px;padding:0 5px;
    display:flex;align-items:center;justify-content:center;margin-left:6px;
  }
  .empty-list{padding:40px 24px;text-align:center;color:var(--wa-text-secondary);font-size:13.5px;}

  /* Chat panel */
  .chat-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--wa-chat-bg);position:relative;}
  .chat-placeholder{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;color:var(--wa-text-secondary);background:var(--wa-bg-app);text-align:center;padding:24px;
  }
  .chat-placeholder h2{font-weight:300;color:var(--wa-text-primary);font-size:26px;margin:0;}
  .chat-placeholder p{margin:0;font-size:13.5px;max-width:320px;}

  .chat-header{
    display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--wa-bg-app);
    border-bottom:1px solid var(--wa-border);height:59px;flex-shrink:0;
  }
  .back-btn{display:none;}
  .chat-header .name-block{flex:1;min-width:0;}
  .chat-header .name-block .n{font-size:15.5px;font-weight:600;}
  .chat-header .name-block .e{font-size:12.5px;color:var(--wa-text-secondary);}
  .ws-dot{width:8px;height:8px;border-radius:50%;background:#c8ccce;flex-shrink:0;transition:background .2s;}
  .ws-dot.on{background:var(--wa-accent);}
  .ws-dot.connecting{background:#f2a154;animation:pulse-dot 1s ease-in-out infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.35;}}

  .messages{
    flex:1;overflow-y:auto;padding:18px 6% 10px;
    background-image:
      radial-gradient(circle at 14px 18px, rgba(17,27,33,0.045) 2px, transparent 2.4px),
      radial-gradient(circle at 46px 52px, rgba(17,27,33,0.04) 2px, transparent 2.4px),
      radial-gradient(circle at 78px 22px, rgba(17,27,33,0.045) 2px, transparent 2.4px);
    background-size:96px 96px;
  }
  .date-chip-wrap{display:flex;justify-content:center;margin:14px 0;}
  .date-chip{
    background:#ffffffcc;color:var(--wa-text-secondary);font-size:12px;font-weight:600;
    padding:5px 12px;border-radius:var(--radius-md);box-shadow:0 1px 1px rgba(0,0,0,.08);
  }
  .msg-row{display:flex;margin:3px 0;}
  .msg-row.out{justify-content:flex-end;}
  .bubble{
    max-width:65%;padding:6px 44px 20px 10px;border-radius:var(--radius-md);
    box-shadow:0 1px 1px rgba(0,0,0,.1);position:relative;font-size:14.3px;line-height:1.4;
    word-wrap:break-word;white-space:pre-wrap;
  }
  .msg-row.in .bubble{background:var(--wa-received-bubble);border-top-left-radius:2px;}
  .msg-row.out .bubble{background:var(--wa-sent-bubble);border-top-right-radius:2px;}
  .bubble .time{
    position:absolute;right:9px;bottom:6px;font-size:10.5px;color:var(--wa-text-secondary);
  }

  .composer{
    display:flex;align-items:flex-end;gap:8px;padding:10px 16px;background:var(--wa-bg-app);
    border-top:1px solid var(--wa-border);flex-shrink:0;position:relative;
  }
  .composer textarea{
    flex:1;resize:none;max-height:120px;border:none;border-radius:var(--radius-lg);
    padding:10px 14px;font-size:14.5px;outline:none;background:var(--wa-panel);line-height:1.4;
  }
  .send-btn{
    width:42px;height:42px;border-radius:50%;border:none;background:var(--wa-accent);
    color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .send-btn:hover{background:var(--wa-accent-dark);}
  .send-btn:disabled{opacity:.5;}

  /* Emoji picker */
  .emoji-picker{
    position:absolute;bottom:64px;left:16px;width:320px;max-height:320px;
    background:var(--wa-panel);border-radius:var(--radius-lg);box-shadow:0 6px 24px rgba(0,0,0,.22);
    display:none;flex-direction:column;overflow:hidden;border:1px solid var(--wa-border);z-index:20;
  }
  .emoji-picker.open{display:flex;}
  .emoji-cats{display:flex;border-bottom:1px solid var(--wa-border);flex-shrink:0;}
  .emoji-cats button{
    flex:1;background:none;border:none;padding:8px 0;font-size:16px;color:var(--wa-text-secondary);
    border-bottom:2px solid transparent;
  }
  .emoji-cats button.active{border-bottom-color:var(--wa-accent);}
  .emoji-grid{overflow-y:auto;padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .emoji-grid button{background:none;border:none;font-size:21px;padding:5px;border-radius:6px;}
  .emoji-grid button:hover{background:var(--wa-hover);}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#111b21;color:#fff;padding:10px 18px;border-radius:var(--radius-md);
    font-size:13.5px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:100;
  }
  .toast.show{opacity:1;}

  /* Mobile */
  @media (max-width:820px){
    #appScreen{max-width:none;}
    .sidebar{width:100%;min-width:0;border-right:none;}
    .chat-panel{position:absolute;inset:0;left:100%;transition:left .22s ease;}
    .app-shell.chat-open .chat-panel{left:0;}
    .app-shell.chat-open .sidebar{display:none;}
    .app-shell{position:relative;overflow:hidden;}
    .back-btn{display:flex;}
    .bubble{max-width:80%;}
  }
</style>
</head>
<body>

<!-- ===================== AUTH SCREEN ===================== -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11c0 2.28 1.06 4.34 2.79 5.79-.14 1.19-.6 2.6-1.29 3.71a.5.5 0 00.56.73c1.86-.5 3.4-1.2 4.4-1.76.83.17 1.7.26 2.54.26 4.97 0 9-3.58 9-8s-4.03-8-9-8z" fill="white"/></svg>
      </div>
      <h1>Chatly</h1>
      <p>Simple, private messaging for your team.</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Log in</button>
      <button class="auth-tab" data-tab="register">Create account</button>
    </div>

    <form id="loginForm" class="auth-form active" autocomplete="off">
      <div class="auth-error" id="loginError"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="Your password">
      </div>
      <button class="auth-submit" type="submit" id="loginSubmit">Log in</button>
    </form>

    <form id="registerForm" class="auth-form" autocomplete="off">
      <div class="auth-error" id="registerError"></div>
      <div class="auth-success" id="registerSuccess"></div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="registerName" required placeholder="Your name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="registerEmail" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="registerPassword" required placeholder="Create a password">
      </div>
      <button class="auth-submit" type="submit" id="registerSubmit">Create account</button>
    </form>
  </div>
</div>

<!-- ===================== APP SCREEN ===================== -->
<div id="appScreen">
  <div class="app-shell" id="appShell">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="me">
          <div class="avatar sm" id="meAvatar">?</div>
          <div class="me-name" id="meName">You</div>
        </div>
        <button class="icon-btn" id="logoutBtn" title="Log out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#667781" stroke-width="2"/><path d="M21 21l-4-4" stroke="#667781" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" id="searchInput" placeholder="Search contacts">
        </div>
      </div>
      <div class="contact-list" id="contactList">
        <div class="empty-list">Loading contacts…</div>
      </div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-placeholder" id="chatPlaceholder">
        <svg width="70" height="70" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11c0 2.28 1.06 4.34 2.79 5.79-.14 1.19-.6 2.6-1.29 3.71a.5.5 0 00.56.73c1.86-.5 3.4-1.2 4.4-1.76.83.17 1.7.26 2.54.26 4.97 0 9-3.58 9-8s-4.03-8-9-8z" fill="#c6cbcd"/></svg>
        <h2>Chatly Web</h2>
        <p>Pick a contact on the left to start chatting. Messages sync in real time over WebSocket.</p>
      </div>

      <div id="chatActive" style="display:none;flex-direction:column;height:100%;">
        <div class="chat-header">
          <button class="icon-btn back-btn" id="backBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="avatar" id="chatAvatar">?</div>
          <div class="name-block">
            <div class="n" id="chatName">—</div>
            <div class="e" id="chatEmail">—</div>
          </div>
          <span class="ws-dot" id="wsDot" title="Connection status"></span>
        </div>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <button class="icon-btn" id="emojiBtn" title="Emoji">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/><path d="M8 14c.7 1.3 2.1 2 4 2s3.3-.7 4-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <textarea id="msgInput" rows="1" placeholder="Type a message"></textarea>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 20l18-8L3 4l0 6 12 2-12 2z" fill="white"/></svg>
          </button>

          <div class="emoji-picker" id="emojiPicker">
            <div class="emoji-cats" id="emojiCats"></div>
            <div class="emoji-grid" id="emojiGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------------- Config ---------------- */
  // Change these if your Go server runs elsewhere.
  // NOTE: the WS handler only allows Origin "http://localhost:3000", and
  // the API has no CORS headers configured, so serve this file from
  // http://localhost:3000 (e.g. `npx serve -l 3000`) with the Go API on :8080.
  const API_BASE = "http://localhost:8080";
  const WS_BASE  = "ws://localhost:8080";

  /* ---------------- State ---------------- */
  let token = localStorage.getItem("chatly_token") || null;
  let me = null;                 // {id, name}
  let contacts = [];              // [{id,name,email}]
  let selectedContact = null;
  const messageCache = new Map(); // userId -> [messages]
  const unreadCounts = new Map(); // userId -> count
  const lastActivity = new Map(); // userId -> ms epoch, for sorting the contact list
  let ws = null;
  let wsReconnectDelay = 1000; // backs off up to 15s, resets to 1s once connected
  let wsRetryTimer = null;

  const AVATAR_COLORS = ["#f56a6a","#f2a154","#f2c94c","#6fcf97","#56ccf2","#5b8def","#9b6bf2","#e2618a"];

  /* ---------------- Helpers ---------------- */
  function qs(id){ return document.getElementById(id); }
  function showToast(msg){
    const t = qs("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 2600);
  }
  function initials(name){
    if(!name) return "?";
    const parts = name.trim().split(/\s+/);
    return ((parts[0]?.[0]||"") + (parts[1]?.[0]||"")).toUpperCase() || name[0].toUpperCase();
  }
  function colorFor(id){
    return AVATAR_COLORS[Math.abs(hashCode(String(id))) % AVATAR_COLORS.length];
  }
  function hashCode(str){
    let h = 0;
    for(let i=0;i<str.length;i++){ h = (h<<5)-h+str.charCodeAt(i); h|=0; }
    return h;
  }
  function decodeJwt(t){
    try{
      const payload = t.split(".")[1];
      const json = decodeURIComponent(atob(payload.replace(/-/g,"+").replace(/_/g,"/"))
        .split("").map(c=>"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)).join(""));
      return JSON.parse(json);
    }catch(e){ return null; }
  }
  function fmtTime(iso){
    const d = new Date(iso);
    if(isNaN(d)) return "";
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }
  function fmtDateChip(iso){
    const d = new Date(iso);
    const today = new Date();
    const yest = new Date(); yest.setDate(today.getDate()-1);
    const sameDay = (a,b)=> a.toDateString()===b.toDateString();
    if(sameDay(d, today)) return "Today";
    if(sameDay(d, yest)) return "Yesterday";
    return d.toLocaleDateString([], {day:"numeric", month:"short", year: d.getFullYear()!==today.getFullYear() ? "numeric": undefined});
  }
  async function api(path, opts={}){
    const headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
    if(token) headers["Authorization"] = "Bearer " + token;
    const res = await fetch(API_BASE + path, Object.assign({}, opts, {headers}));
    let body = null;
    try{ body = await res.json(); }catch(e){ /* empty body */ }
    if(res.status === 401 && token){
      // token expired or rejected mid-session — don't strand the user on a broken screen
      logout();
      showToast("Your session expired. Please log in again.");
      throw new Error("Session expired");
    }
    if(!res.ok){
      const msg = (body && body.message) || (typeof body === "string" ? body : null) || ("Request failed (" + res.status + ")");
      throw new Error(msg);
    }
    return body;
  }

  /* ---------------- Auth screen wiring ---------------- */
  document.querySelectorAll(".auth-tab").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      document.querySelectorAll(".auth-tab").forEach(t=>t.classList.remove("active"));
      document.querySelectorAll(".auth-form").forEach(f=>f.classList.remove("active"));
      tab.classList.add("active");
      qs(tab.dataset.tab + "Form").classList.add("active");
    });
  });

  qs("loginForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const errEl = qs("loginError");
    errEl.classList.remove("show");
    const btn = qs("loginSubmit");
    btn.disabled = true; btn.textContent = "Logging in…";
    try{
      const email = qs("loginEmail").value.trim();
      const password = qs("loginPassword").value;
      const data = await api("/api/login", {method:"POST", body: JSON.stringify({email, password})});
      if(!data || !data.token) throw new Error("No token returned");
      token = data.token;
      localStorage.setItem("chatly_token", token);
      await enterApp();
    }catch(err){
      errEl.textContent = err.message || "Login failed";
      errEl.classList.add("show");
    }finally{
      btn.disabled = false; btn.textContent = "Log in";
    }
  });

  qs("registerForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const errEl = qs("registerError");
    const okEl = qs("registerSuccess");
    errEl.classList.remove("show"); okEl.classList.remove("show");
    const btn = qs("registerSubmit");
    btn.disabled = true; btn.textContent = "Creating…";
    try{
      const name = qs("registerName").value.trim();
      const email = qs("registerEmail").value.trim();
      const password = qs("registerPassword").value;
      await api("/api/register", {method:"POST", body: JSON.stringify({name, email, password})});
      okEl.textContent = "Account created — you can log in now.";
      okEl.classList.add("show");
      qs("registerForm").reset();
      setTimeout(()=>{ document.querySelector('.auth-tab[data-tab="login"]').click(); }, 900);
    }catch(err){
      errEl.textContent = err.message || "Registration failed";
      errEl.classList.add("show");
    }finally{
      btn.disabled = false; btn.textContent = "Create account";
    }
  });

  /* ---------------- Entering the app ---------------- */
  async function enterApp(){
    const claims = decodeJwt(token);
    if(!claims || !claims.id){
      showToast("Session invalid, please log in again.");
      logout();
      return;
    }
    me = {id: claims.id, name: claims.name || "Me"};
    qs("meName").textContent = me.name;
    const meAv = qs("meAvatar");
    meAv.textContent = initials(me.name);
    meAv.style.background = colorFor(me.id);

    qs("authScreen").style.display = "none";
    qs("appScreen").classList.add("active");

    await loadContacts();
    connectWS();
  }

  function logout(){
    clearTimeout(wsRetryTimer);
    if(ws){ try{ ws.close(); }catch(e){} ws=null; }
    token = null; me = null; contacts = []; selectedContact = null;
    messageCache.clear();
    unreadCounts.clear();
    lastActivity.clear();
    wsReconnectDelay = 1000;
    localStorage.removeItem("chatly_token");
    qs("appScreen").classList.remove("active");
    qs("authScreen").style.display = "flex";
    qs("chatActive").style.display = "none";
    qs("chatPlaceholder").style.display = "flex";
    qs("appShell").classList.remove("chat-open");
    qs("loginForm").reset();
  }
  qs("logoutBtn").addEventListener("click", logout);

  /* ---------------- Contacts ---------------- */
  async function loadContacts(){
    try{
      contacts = await api("/api/users");
      renderContacts(contacts);
    }catch(err){
      qs("contactList").innerHTML = '<div class="empty-list">Could not load contacts.<br>' + escapeHtml(err.message) + '</div>';
    }
  }

  function renderContacts(list){
    const el = qs("contactList");
    if(!list || list.length===0){
      el.innerHTML = '<div class="empty-list">No other users yet. Invite a teammate to register!</div>';
      return;
    }
    el.innerHTML = "";
    const sorted = [...list].sort((a,b)=> (lastActivity.get(b.id)||0) - (lastActivity.get(a.id)||0));
    sorted.forEach(u=>{
      const row = document.createElement("div");
      row.className = "contact" + (selectedContact && selectedContact.id===u.id ? " active" : "");
      row.dataset.id = u.id;
      const cached = messageCache.get(u.id);
      const last = cached && cached.length ? cached[cached.length-1] : null;
      const unread = unreadCounts.get(u.id) || 0;
      row.innerHTML = `
        <div class="avatar" style="background:${colorFor(u.id)}">${initials(u.name)}</div>
        <div class="contact-info">
          <div class="contact-top">
            <div class="contact-name">${escapeHtml(u.name)}</div>
            <div class="contact-time">${last ? fmtTime(last.created_at) : ""}</div>
          </div>
          <div class="contact-top">
            <div class="contact-preview">${last ? escapeHtml(truncate(last.content, 40)) : escapeHtml(u.email)}</div>
            ${unread ? `<div class="unread-badge">${unread > 99 ? "99+" : unread}</div>` : ""}
          </div>
        </div>
      `;
      row.addEventListener("click", ()=> openConversation(u));
      el.appendChild(row);
    });
  }

  qs("searchInput").addEventListener("input", (e)=>{
    const q = e.target.value.trim().toLowerCase();
    const filtered = contacts.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
    renderContacts(filtered);
  });

  function truncate(str, n){ return str.length>n ? str.slice(0,n-1)+"…" : str; }
  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  /* ---------------- Conversation ---------------- */
  async function openConversation(user){
    selectedContact = user;
    qs("appShell").classList.add("chat-open");
    document.querySelectorAll(".contact").forEach(c=>c.classList.toggle("active", Number(c.dataset.id)===user.id));

    qs("chatPlaceholder").style.display = "none";
    qs("chatActive").style.display = "flex";
    qs("chatAvatar").textContent = initials(user.name);
    qs("chatAvatar").style.background = colorFor(user.id);
    qs("chatName").textContent = user.name;
    qs("chatEmail").textContent = user.email;

    if(!messageCache.has(user.id)){
      try{
        const msgs = await api("/api/messages/" + user.id);
        messageCache.set(user.id, msgs || []);
        const last = msgs && msgs.length ? msgs[msgs.length-1] : null;
        if(last) lastActivity.set(user.id, new Date(last.created_at).getTime() || 0);
      }catch(err){
        messageCache.set(user.id, []);
        showToast("Could not load messages: " + err.message);
      }
    }
    unreadCounts.delete(user.id);
    renderContacts(contactsFilteredBySearch());
    renderMessages();
  }

  qs("backBtn").addEventListener("click", ()=>{
    qs("appShell").classList.remove("chat-open");
  });

  function renderMessages(){
    const el = qs("messages");
    el.innerHTML = "";
    const list = messageCache.get(selectedContact.id) || [];
    let lastDateChip = null;
    list.forEach(m=>{
      const chip = fmtDateChip(m.created_at);
      if(chip !== lastDateChip){
        const chipWrap = document.createElement("div");
        chipWrap.className = "date-chip-wrap";
        chipWrap.innerHTML = `<div class="date-chip">${chip}</div>`;
        el.appendChild(chipWrap);
        lastDateChip = chip;
      }
      const row = document.createElement("div");
      const out = m.sender_id === me.id;
      row.className = "msg-row " + (out ? "out" : "in");
      row.innerHTML = `<div class="bubble"><span class="txt">${escapeHtml(m.content)}</span><span class="time">${fmtTime(m.created_at)}</span></div>`;
      el.appendChild(row);
    });
    el.scrollTop = el.scrollHeight;
  }

  function appendIncoming(m){
    // update cache for whichever side of the conversation this belongs to
    const otherId = m.sender_id === me.id ? m.receiver_id : m.sender_id;
    if(!messageCache.has(otherId)) messageCache.set(otherId, []);
    messageCache.get(otherId).push(m);
    lastActivity.set(otherId, new Date(m.created_at).getTime() || Date.now());

    const isViewingThisContact = selectedContact && selectedContact.id === otherId;
    if(isViewingThisContact){
      renderMessages();
    }else if(m.sender_id !== me.id){
      // only count as unread / notify if it's an incoming message we didn't just send ourselves
      unreadCounts.set(otherId, (unreadCounts.get(otherId)||0) + 1);
      showToast("New message from " + (contacts.find(c=>c.id===otherId)?.name || "a contact"));
    }
    renderContacts(contactsFilteredBySearch());
  }
  function contactsFilteredBySearch(){
    const q = qs("searchInput").value.trim().toLowerCase();
    if(!q) return contacts;
    return contacts.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
  }

  /* ---------------- WebSocket ---------------- */
  function setWsState(state){
    // state: "live" | "connecting" | "offline"
    const dot = qs("wsDot");
    if(!dot) return;
    dot.classList.remove("on", "connecting");
    if(state === "live") dot.classList.add("on");
    if(state === "connecting") dot.classList.add("connecting");
    dot.title = state === "live" ? "Connected"
      : state === "connecting" ? "Reconnecting…"
      : "Offline — messages will send once reconnected";
  }

  function connectWS(){
    if(!token) return;
    clearTimeout(wsRetryTimer);
    setWsState("connecting");
    ws = new WebSocket(WS_BASE + "/ws?token=" + encodeURIComponent(token));
    ws.onopen = ()=>{
      setWsState("live");
      wsReconnectDelay = 1000; // reset backoff after a successful connection
    };
    ws.onclose = ()=>{
      setWsState("offline");
      if(token){
        wsRetryTimer = setTimeout(connectWS, wsReconnectDelay);
        wsReconnectDelay = Math.min(wsReconnectDelay * 2, 15000);
      }
    };
    ws.onerror = ()=> setWsState("offline");
    ws.onmessage = (evt)=>{
      let data;
      try{ data = JSON.parse(evt.data); }catch(e){ return; }
      if(data.error){ showToast(data.error); return; }
      if(typeof data.sender_id === "number"){ appendIncoming(data); }
    };
  }

  /* ---------------- Composer ---------------- */
  const input = qs("msgInput");
  input.addEventListener("input", ()=>{
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
  input.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });
  qs("sendBtn").addEventListener("click", sendMessage);

  function sendMessage(){
    const text = input.value.trim();
    if(!text || !selectedContact) return;
    if(!ws || ws.readyState !== WebSocket.OPEN){
      showToast("Not connected. Reconnecting…");
      return;
    }
    ws.send(JSON.stringify({receiver_id: selectedContact.id, content: text}));
    input.value = "";
    input.style.height = "auto";
    closeEmojiPicker();
  }

  /* ---------------- Emoji picker ---------------- */
  const EMOJI_CATEGORIES = {
    "😊": ["😀","😁","😂","🤣","😊","😍","😘","😜","🤔","😴","😇","🙂","😉","😅","😭","😡","🥳","😎","🤩","😬","😢","😱","🥺","😏","🙃","😌","🤗","🤯","😳","🥹"],
    "👍": ["👍","👎","👏","🙌","🙏","💪","🤝","✌️","🤞","👌","🤙","👋","✋","🤟","💅","🫡","👊","🤘"],
    "❤️": ["❤️","🧡","💛","💚","💙","💜","🖤","🤍","💔","❤️‍🔥","💕","💞","💓","💗","💖","💘","😻"],
    "🐶": ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🦄","🐦","🐝","🐢","🐬"],
    "🍕": ["🍏","🍔","🍕","🍟","🌭","🍿","🍩","🍪","🍰","🍫","🍦","🍺","☕","🍜","🍣","🥗","🍎","🍉","🍓","🥑"],
    "⚽": ["⚽","🏀","🏈","🎾","🎮","🎲","🎧","🎸","🚴","🏆","🎯","🎳","🎱","🚀","✈️","🚗","⛺","🏖️"],
    "💡": ["💡","🔥","⭐","✨","🎉","🎊","💯","✅","❌","⚠️","🔔","📌","📎","🔒","🔑","💰","🎁","📷"]
  };
  let activeCat = "😊";
  function buildEmojiPicker(){
    const cats = qs("emojiCats");
    cats.innerHTML = "";
    Object.keys(EMOJI_CATEGORIES).forEach(cat=>{
      const b = document.createElement("button");
      b.textContent = cat;
      b.className = cat === activeCat ? "active" : "";
      b.addEventListener("click", ()=>{ activeCat = cat; buildEmojiPicker(); });
      cats.appendChild(b);
    });
    const grid = qs("emojiGrid");
    grid.innerHTML = "";
    EMOJI_CATEGORIES[activeCat].forEach(em=>{
      const b = document.createElement("button");
      b.textContent = em;
      b.addEventListener("click", ()=>{
        insertAtCursor(input, em);
      });
      grid.appendChild(b);
    });
  }
  function insertAtCursor(field, text){
    const start = field.selectionStart ?? field.value.length;
    const end = field.selectionEnd ?? field.value.length;
    field.value = field.value.slice(0, start) + text + field.value.slice(end);
    field.focus();
    field.selectionStart = field.selectionEnd = start + text.length;
    field.dispatchEvent(new Event("input"));
  }
  function closeEmojiPicker(){ qs("emojiPicker").classList.remove("open"); }
  qs("emojiBtn").addEventListener("click", (e)=>{
    e.stopPropagation();
    buildEmojiPicker();
    qs("emojiPicker").classList.toggle("open");
  });
  document.addEventListener("click", (e)=>{
    const picker = qs("emojiPicker");
    if(picker.classList.contains("open") && !picker.contains(e.target) && e.target !== qs("emojiBtn")){
      closeEmojiPicker();
    }
  });

  /* ---------------- Boot ---------------- */
  if(token){ enterApp().catch(()=> logout()); }
})();
</script>
</body>
</html>
